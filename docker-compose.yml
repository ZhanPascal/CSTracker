services:
  postgres:
    image: postgres:16-alpine
    container_name: cstracker-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: cstracker_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d cstracker_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: cstracker-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres

  backend:
    build:
      context: ./CSTracker/backend
    container_name: cstracker-backend
    restart: unless-stopped
    environment:
      PORT: 5000
      DATABASE_URL: postgresql://user:password@postgres:5432/cstracker_db
      RIOT_API_KEY: ${RIOT_API_KEY}
    ports:
      - "5000:5000"
    volumes:
      - ./CSTracker/backend/src:/app/src
      - ./CSTracker/backend/prisma:/app/prisma
      - /app/node_modules
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./CSTracker/frontend
    container_name: cstracker-frontend
    restart: unless-stopped
    environment:
      BACKEND_URL: http://backend:5000
    ports:
      - "3000:3000"
    volumes:
      - ./CSTracker/frontend/src:/app/src
      - /app/node_modules
    depends_on:
      - backend

volumes:
  postgres_data: